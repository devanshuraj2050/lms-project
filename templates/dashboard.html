<!DOCTYPE html>
<html>
<head>

<title>LMS Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:220px;
background:#0b3d91;
color:white;
height:100vh;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#0f52ba;
}

/* MAIN AREA */

.main{
flex:1;
padding:30px;
background:#f4f6fb;
}

.card-container{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
width:200px;
text-align:center;
}

.card h3{
margin:10px 0;
}

button{
padding:10px 15px;
background:#0b3d91;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0f52ba;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Admin Panel</h2>

<a href="{{ url_for('dashboard') }}">Dashboard</a>

<a href="#">Manage Courses</a>

<a href="#">Gallery Manager</a>

<a href="#">Students</a>

<a href="{{ url_for('logout') }}">Logout</a>

</div>

<!-- MAIN CONTENT -->

<div class="main">

<h1>Welcome to LMS Dashboard</h1>

<p>You are logged in successfully.</p>

<div class="card-container">

<div class="card">
        <h3>Add Course</h3>
        <p>Create a new course</p>
        <a href="/add_course"><button>Open</button></a>
        <a href="{{ url_for('manage_courses') }}">
            Manage Courses
            </a>
            
</div>

<div class="card">
<h3>Gallery</h3>
<p>Upload images</p>
<a href="{{ url_for('upload') }}">
<button>Open</button>
</a>


<a href="/manage_gallery">Manage Gallery</a>

</div>

<div class="card">
<h3>Students</h3>
<p>View students</p>
<button>Open</button>
<a href="/admin/students" class="btn btn-primary">Open</a>
</div>

</div>

</div>

</body>
</html>
