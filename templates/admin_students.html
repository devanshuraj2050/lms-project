<!DOCTYPE html>
<html>
<head>
<title>Students</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6fb;
}

.sidebar{
width:220px;
height:100vh;
background:#1e3a8a;
color:white;
position:fixed;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
}

.sidebar a:hover{
background:#2c5cc5;
}

.content{
margin-left:240px;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:8px;
overflow:hidden;
}

th, td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:#2c5cc5;
color:white;
}

tr:hover{
background:#f5f5f5;
}

</style>

</head>

<body>

<div class="sidebar">
<h2>Admin Panel</h2>

<a href="/dashboard">Dashboard</a>
<a href="/manage_courses">Manage Courses</a>
<a href="/upload">Gallery Manager</a>
<a href="/admin/students">Students</a>
<a href="/logout">Logout</a>

</div>

<div class="content">

<h2>Registered Students</h2>

<table>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
</tr>

{% for student in students %}
<tr>
<td>{{ student[0] }}</td>
<td>{{ student[1] }}</td>
<td>{{ student[2] }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
