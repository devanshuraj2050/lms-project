<!DOCTYPE html>
<html>
<head>

<title>Manage Gallery</title>

<style>

.gallery-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.gallery-item{
background:#fff;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.gallery-item img{
width:100%;
height:160px;
object-fit:cover;
border-radius:6px;
}

.delete-btn{
display:inline-block;
margin-top:8px;
color:white;
background:red;
padding:5px 10px;
border-radius:5px;
text-decoration:none;
}

.upload-link{
display:inline-block;
margin-bottom:20px;
}

</style>

</head>

<body>

<h2>Manage Gallery</h2>

<a class="upload-link" href="{{ url_for('upload') }}">Upload New Image</a>

<div class="gallery-grid">

{% for img in images %}

<div class="gallery-item">

<img src="{{ url_for('static', filename='images/' + img) }}">

<p>{{ img.split('.')[0].replace('_',' ').replace('10',' 10 ').title() }}</p>

<a class="delete-btn"
   href="{{ url_for('delete_image', filename=img) }}"
   onclick="return confirm('Are you sure you want to delete this image?');">
Delete
</a>

</div>

{% endfor %}

</div>

</body>
</html>
