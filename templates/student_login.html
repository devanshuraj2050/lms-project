<!DOCTYPE html>
<html>
<head>

<title>Student Login</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>

.login-box{
width:350px;
margin:100px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2f5cc8;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1f46a5;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Student Login</h2>

<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<p style="margin-top:15px;">
New student? <a href="/signup">Sign up</a>
</p>

</div>

</body>
</html>
