<h2>Manage Courses</h2>

<table border="1" cellpadding="10">

    <tr>
        <th>Course</th>
        <th>Action</th>
    </tr>
    
    {% for course in courses %}
    
    <tr>
        <td>{{ course[1] }}</td>  <!-- FIXED -->
        <td>
            <a href="{{ url_for('delete_course', id=course[0]) }}">Delete</a>
        </td>
    </tr>
    
    {% endfor %}
    
    </table>
