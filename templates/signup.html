<!DOCTYPE html>
<html>
<head>
<title>Student Sign Up</title>

<style>
body{
font-family:Arial;
background:#f4f6fb;
}

.container{
width:400px;
margin:auto;
margin-top:80px;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
}

button{
background:#2c5cc5;
color:white;
padding:10px;
border:none;
width:100%;
border-radius:4px;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Student Account</h2>

<form method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Sign Up</button>

</form>

</div>

</body>
</html>
