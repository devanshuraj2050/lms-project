<!DOCTYPE html>
<html>
<head>
<title>Course Analytics</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

table{
width:60%;
margin:auto;
border-collapse:collapse;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

th,td{
padding:15px;
text-align:left;
border-bottom:1px solid #ddd;
}

th{
background:#2f4fb3;
color:white;
}

tr:hover{
background:#f1f1f1;
}

</style>
</head>

<body>

<h1>Course Enrollment Analytics</h1>

<table>

<tr>
<th>Course</th>
<th>Students Enrolled</th>
</tr>

{% for course in course_data %}

<tr>
<td>{{ course.title }}</td>
<td>{{ course.count }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
