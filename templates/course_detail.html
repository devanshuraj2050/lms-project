<!DOCTYPE html>

<html>
<head>
    <title>Course Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-4xl mx-auto mt-10 bg-white p-6 rounded-xl shadow">


<img src="{{ course[6] }}" class="w-full h-64 object-cover rounded">

<h1 class="text-2xl font-bold mt-4">{{ course[1] }}</h1>

<p class="text-gray-600 mt-2">{{ course[5] }}</p>

<p class="mt-3"><b>Duration:</b> {{ course[3] }}</p>

<p class="text-blue-600 font-bold text-lg mt-2">₹ {{ course[4] }}</p>

{% if enrolled %}

<button class="mt-4 bg-gray-400 text-white px-5 py-2 rounded cursor-not-allowed">
    Already Enrolled ✅
</button>

{% else %}

<a href="/enroll/{{ course[0] }}">
    <button class="mt-4 bg-green-600 text-white px-5 py-2 rounded hover:bg-green-700">
        Enroll Now
    </button>
</a>

{% endif %}


</div>

</body>
</html>
